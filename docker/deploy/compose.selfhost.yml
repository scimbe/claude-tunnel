# Self-host deployment bundle (M21.1b): the operator runs the hosted control
# plane + one edge as long-running, restart-on-failure services with durable
# state and health checks. Customers run their own agents (outbound-only) and
# distribute the CA root (docs/deploy) to their clients.
#
#   cp docker/deploy/.env.example docker/deploy/.env   # then edit secrets
#   docker compose -f docker/deploy/compose.selfhost.yml --env-file docker/deploy/.env up --build -d
#
# The control plane persists to a named volume, so restarts and upgrades keep
# enrollment, the tunnel registry and the credit ledger intact.

name: ct-selfhost

services:
  control-plane:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    image: ct-testbed
    command: ["ct-control-plane"]
    environment:
      CT_CONTROL_PLANE_LISTEN: "0.0.0.0:8090"
      CT_CONTROL_PLANE_DB: "/data/control-plane.db"
      # Where the control plane reads the edge CA root to publish at /pki/ca
      # (#11). The edge writes it into the shared volume (CT_EDGE_CERT_OUT below);
      # the control plane mounts that volume read-only and serves the DER. Without
      # the mount, /shared/edge-cert.der is absent and /pki/ca returns 503 (#16).
      CT_CP_EDGE_CERT_PATH: "/shared/edge-cert.der"
      # Live tunnel count for /status & the operator page (#17): the live
      # registry is the edge's, so scrape its /metrics (ct_edge_active_tunnels)
      # over the internal network. Falls back to the CP registry if unreachable.
      CT_CP_EDGE_METRICS_URL: "http://edge:9600/metrics"
      # OIDC / Keycloak (verified for /me/* endpoints); set in .env.
      CT_OIDC_ISSUER: "${CT_OIDC_ISSUER:-}"
      # #81 SEC81c-c-i / #100 / #103: the edge-facing channel-authorize endpoint
      # (POST /internal/channel/authorize) mounts only when this shared admin token is
      # set. It is the SAME 64-hex CT_EDGE_ADMIN_TOKEN the edge holds — so setting that
      # one secret (already required for the front door / tunnel revoke) also turns on
      # the Agent-Fabric channel broker end-to-end, with no extra step.
      CT_CP_EDGE_ADMIN_TOKEN: "${CT_EDGE_ADMIN_TOKEN:-}"
    env_file:
      - .env
    volumes:
      - cpdata:/data
      - shared:/shared:ro
    ports:
      # #85: bind the control plane's plain-HTTP :8090 to LOOPBACK only. It carries
      # OIDC bearer tokens + portal session cookies in cleartext, so it must never be
      # published on a public interface (docs/security/tls-everywhere.md). Public
      # access goes through the :443 front door (compose.frontdoor.yml), which
      # terminates TLS and reverse-proxies over the internal docker network; a local
      # reverse proxy / debugging still reaches 127.0.0.1:8090.
      - "127.0.0.1:${CONTROL_PLANE_PORT:-8090}:8090"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8090/readyz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s

  edge:
    image: ct-testbed
    command: ["ct-edge"]
    environment:
      CT_EDGE_LISTEN: "0.0.0.0:4433"
      CT_EDGE_POW_DIFFICULTY: "${EDGE_POW_DIFFICULTY:-16}"
      CT_EDGE_CERT_OUT: "/shared/edge-cert.der"
      # Expose live gauges (ct_edge_active_tunnels/-agents + relay counters, #10).
      # The control plane scrapes this internally for /status (#17); it is also
      # published to the host loopback below so operators can scrape it locally (#19).
      CT_EDGE_METRICS_LISTEN: "0.0.0.0:9600"
      # #81 SEC81c-c / #100 / #103: the Agent-Fabric channel broker. It binds a
      # rendezvous QUIC endpoint and authorizes channel joins against the control plane.
      # run_edge activates it ONLY when all three of these are set-and-non-empty (else it
      # is gracefully absent), so it turns on automatically the moment the operator has
      # CT_EDGE_ADMIN_TOKEN configured (which the front door / tunnel-revoke already
      # require) — no separate deploy step. This is the plane-side of the A2A channel
      # tunnel (source <-> sink, #98/#99/#103).
      CT_EDGE_CP_URL: "http://control-plane:8090"
      CT_EDGE_ADMIN_TOKEN: "${CT_EDGE_ADMIN_TOKEN:-}"
      CT_EDGE_CHANNEL_LISTEN: "0.0.0.0:4435"
    volumes:
      - shared:/shared
    ports:
      - "${EDGE_PORT:-4433}:4433/udp"
      - "${EDGE_PORT:-4433}:4433/tcp"
      # Agent-Fabric channel rendezvous/relay (#100/#103). Restrictive client networks
      # that block this port fall back to the :443 front door (#106, ALPN=ct-edge-channel).
      - "${EDGE_CHANNEL_PORT:-4435}:4435/udp"
      - "${EDGE_CHANNEL_PORT:-4435}:4435/tcp"
      # Operator-facing metrics scrape endpoint (#19), bound to LOOPBACK (#85) — it's
      # unauthenticated, so it must not be published on a public interface; scrape it
      # from 127.0.0.1 (or internally via the docker network at edge:9600). Override
      # the host port with EDGE_METRICS_PORT in .env; defaults to 9600.
      - "127.0.0.1:${EDGE_METRICS_PORT:-9600}:9600"
    restart: unless-stopped
    depends_on:
      control-plane:
        condition: service_healthy

volumes:
  cpdata:
  shared:
