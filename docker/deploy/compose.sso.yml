# Optional SSO overlay (#42 KC1): a Keycloak/OIDC identity provider for exercising
# the customer-portal flow (#25-#29) end-to-end with a REAL Authorization-Code
# login, instead of only hermetic HS256 test doubles.
#
# OFF BY DEFAULT: this is a separate overlay you opt into by naming it explicitly.
# The base self-host stack runs unchanged without it.
#
#   docker compose \
#     -f docker/deploy/compose.selfhost.yml \
#     -f docker/deploy/compose.sso.yml \
#     --env-file docker/deploy/.env up --build -d
#
# On boot Keycloak imports the declarative demo realm (keycloak/ct-demo-realm.json):
# realm `ct-demo`, confidential client `ct-portal` (RS256), self-registration on.
# KC2 will export the realm's RS256 signing key to CT_OIDC_PUBKEY_PATH; KC3 wires
# the control-plane's CT_OIDC_* env + the demo click-through docs. This first
# packet (KC1) just stands the IdP + realm up so the rest can build on a running
# provider.

name: ct-selfhost

services:
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: ["start-dev", "--import-realm"]
    environment:
      # Dev-mode bootstrap admin (override in .env for anything reachable). These
      # are Keycloak's own admin-console creds, unrelated to the portal client.
      KC_BOOTSTRAP_ADMIN_USERNAME: "${KC_ADMIN_USER:-admin}"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "${KC_ADMIN_PASSWORD:-admin}"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./keycloak/ct-demo-realm.json:/opt/keycloak/data/import/ct-demo-realm.json:ro
    ports:
      - "${KEYCLOAK_PORT:-8091}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.0\\r\\n\\r\\n' >&3 && cat <&3 | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
