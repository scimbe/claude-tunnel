# Hosted control-plane Deployment (M21.2a).
#
# - replicas: 1 + Recreate: SQLite on a ReadWriteOnce PVC is a single writer, so
#   never run two pods against the same volume; Recreate tears the old pod down
#   before the new one binds the claim.
# - livenessProbe  -> /healthz (always 200 while the process is up).
# - readinessProbe -> /readyz  (pings the DB; pod leaves the Service on 503, so
#   traffic only arrives once the durable store is reachable).
# - runs non-root with a read-only root FS; only /data (the PVC) is writable.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ct-control-plane
  namespace: ct-system
  labels:
    app.kubernetes.io/name: ct-control-plane
    app.kubernetes.io/part-of: claude-tunnel
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ct-control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ct-control-plane
        app.kubernetes.io/part-of: claude-tunnel
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      containers:
        - name: control-plane
          image: ct-testbed
          command: ["ct-control-plane"]
          envFrom:
            - configMapRef:
                name: ct-control-plane-config
          ports:
            - name: http
              containerPort: 8090
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ct-control-plane-data
