# Hosted edge Deployment (M21.2b) — the data-plane entry point.
#
# - The edge serves QUIC (UDP) and a TLS-over-TCP fallback on the same port 4433.
# - replicas: 1: each edge mints its own internal CA at startup and writes the
#   CA root to /shared; distributing one edge's root to clients is out of band.
#   Multi-edge (shared CA / cert distribution) is a later concern.
# - No control-plane HTTP surface, so liveness/readiness use a TCP-socket probe
#   on 4433 (the TLS-TCP fallback listener) as the "edge is accepting" signal.
# - Hardened: non-root, read-only rootfs, all caps dropped. It needs no
#   NET_ADMIN — that was only for netem in the testbed image.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ct-edge
  namespace: ct-system
  labels:
    app.kubernetes.io/name: ct-edge
    app.kubernetes.io/part-of: claude-tunnel
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ct-edge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ct-edge
        app.kubernetes.io/part-of: claude-tunnel
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      containers:
        - name: edge
          image: ct-testbed
          command: ["ct-edge"]
          envFrom:
            - configMapRef:
                name: ct-edge-config
          ports:
            - name: quic
              containerPort: 4433
              protocol: UDP
            - name: tls-tcp
              containerPort: 4433
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: tls-tcp
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: tls-tcp
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: shared
              mountPath: /shared
      volumes:
        # The edge writes its CA root here; the operator extracts and distributes
        # it to clients. emptyDir is enough — it is regenerated on each start.
        - name: shared
          emptyDir: {}
