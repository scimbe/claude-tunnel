# Claude Tunnel testbed topology (M5.5).
#
# edge + agent(+origin) + client on a static-IP network, coordinating via a
# shared volume. tc netem link impairment is configurable per node via env
# (EDGE_/AGENT_/CLIENT_ DELAY|LOSS|RATE), applied by netem-entrypoint.sh.
#
# Run (unimpaired):
#   docker compose -f docker/docker-compose.yml up --build \
#       --abort-on-container-exit --exit-code-from client
# Run with 30ms edge delay + 1% loss:
#   EDGE_DELAY=30ms EDGE_LOSS=1% docker compose ... up ...

name: ct-testbed

services:
  edge:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ct-testbed
    cap_add:
      - NET_ADMIN
    entrypoint: ["/usr/local/bin/netem-entrypoint.sh"]
    command: ["ct-edge"]
    environment:
      CT_EDGE_LISTEN: "0.0.0.0:4433"
      CT_EDGE_POW_DIFFICULTY: "${EDGE_POW_DIFFICULTY:-8}"
      CT_EDGE_CERT_OUT: "/shared/edge-cert.der"
      CT_NETEM_DELAY: "${EDGE_DELAY:-}"
      CT_NETEM_LOSS: "${EDGE_LOSS:-}"
      CT_NETEM_RATE: "${EDGE_RATE:-}"
    volumes:
      - shared:/shared
    networks:
      ct-net:
        ipv4_address: 10.5.0.2

  origin:
    image: alpine/socat:latest
    command: ["TCP-LISTEN:8080,reuseaddr,fork", "EXEC:/bin/cat"]
    networks:
      ct-net:
        ipv4_address: 10.5.0.3

  agent:
    image: ct-testbed
    cap_add:
      - NET_ADMIN
    entrypoint: ["/usr/local/bin/netem-entrypoint.sh"]
    command: ["ct-agent"]
    environment:
      CT_AGENT_EDGE: "10.5.0.2:4433"
      CT_AGENT_ORIGIN: "10.5.0.3:8080"
      CT_AGENT_EDGE_CERT: "/shared/edge-cert.der"
      CT_AGENT_CAPABILITY_OUT: "/shared/capability.bin"
      CT_NETEM_DELAY: "${AGENT_DELAY:-}"
      CT_NETEM_LOSS: "${AGENT_LOSS:-}"
      CT_NETEM_RATE: "${AGENT_RATE:-}"
    volumes:
      - shared:/shared
    depends_on:
      - edge
      - origin
    networks:
      ct-net:
        ipv4_address: 10.5.0.4

  client:
    image: ct-testbed
    cap_add:
      - NET_ADMIN
    entrypoint: ["/usr/local/bin/netem-entrypoint.sh"]
    command: ["ct-client"]
    environment:
      CT_CLIENT_EDGE_CERT: "/shared/edge-cert.der"
      CT_CLIENT_CAPABILITY: "/shared/capability.bin"
      CT_CLIENT_PAYLOAD: "hello-tunnel"
      CT_CLIENT_ITERATIONS: "${CLIENT_ITERATIONS:-1}"
      CT_BENCH_MODE: "${BENCH_MODE:-}"
      CT_BENCH_DELAY: "${EDGE_DELAY:-}"
      CT_BENCH_LOSS: "${EDGE_LOSS:-}"
      CT_BENCH_RATE: "${EDGE_RATE:-}"
      CT_NETEM_DELAY: "${CLIENT_DELAY:-}"
      CT_NETEM_LOSS: "${CLIENT_LOSS:-}"
      CT_NETEM_RATE: "${CLIENT_RATE:-}"
    volumes:
      - shared:/shared
    depends_on:
      - agent
    networks:
      ct-net:
        ipv4_address: 10.5.0.5

volumes:
  shared:

networks:
  ct-net:
    ipam:
      config:
        - subnet: 10.5.0.0/24
