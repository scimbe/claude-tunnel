name: release

# #75 IS2 — build the ct-agent binary per OS/arch and publish to a GitHub Release,
# which is where the portal's /install.sh and /install.ps1 (IS3a/IS4 renderers) point.
# Asset names MUST match those scripts: ct-agent-<os>-<arch>[.exe].
# Triggered by a version tag (e.g. v0.1.0).

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the release and attach assets

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create the release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag || true

  build:
    needs: create-release
    name: ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,    asset: ct-agent-linux-x86_64 }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu,   asset: ct-agent-linux-aarch64 }
          - { os: macos-13,       target: x86_64-apple-darwin,         asset: ct-agent-darwin-x86_64 }
          - { os: macos-14,       target: aarch64-apple-darwin,        asset: ct-agent-darwin-aarch64 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,      asset: ct-agent-windows-x86_64.exe }
          - { os: windows-latest, target: aarch64-pc-windows-msvc,     asset: ct-agent-windows-aarch64.exe }
    steps:
      - uses: actions/checkout@v4

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Linux aarch64 cross-linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build ct-agent (release)
        run: cargo build -p ct-agent --release --locked --target ${{ matrix.target }}

      - name: Stage + upload asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bin="target/${{ matrix.target }}/release/ct-agent"
          [ -f "$bin.exe" ] && bin="$bin.exe"
          cp "$bin" "${{ matrix.asset }}"
          gh release upload "$GITHUB_REF_NAME" "${{ matrix.asset }}" --clobber
