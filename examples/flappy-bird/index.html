<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Flappy Bird — cooperative build</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='7' fill='%23f7d51d' stroke='%23c9a80f'/%3E%3C/svg%3E">
<style>
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: #202020;
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation;
  }
  canvas {
    image-rendering: pixelated;
    box-shadow: 0 0 24px rgba(0,0,0,0.5);
    max-width: 100vw; max-height: 100vh;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
"use strict";
// Flappy Bird clone — cooperative design synthesis (claude-tunnel #159):
//   physics/pacing/collision-fairness: source-2
//   palette/UI/restart-flow/juice:     sink
//   integration + implementation:      central
//
// Single file, no build step, no external assets — everything is drawn procedurally.

const LOGICAL_W = 288, LOGICAL_H = 512;
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

function resize() {
  const scale = Math.min(window.innerWidth / LOGICAL_W, window.innerHeight / LOGICAL_H);
  canvas.style.width = (LOGICAL_W * scale) + "px";
  canvas.style.height = (LOGICAL_H * scale) + "px";
  canvas.width = LOGICAL_W;
  canvas.height = LOGICAL_H;
}
window.addEventListener("resize", resize);
resize();

// ---------- Palette (sink) ----------
const COLORS = {
  skyTop: "#4ec0ca",
  skyBottom: "#8fe0e6",
  ground: "#ded895",
  groundEdge: "#c9c07a",
  pipeBody: "#73c043",
  pipeOutline: "#4a9138",
  bird: "#f7d51d",
  birdOutline: "#c9a80f",
  beak: "#e67e22",
  white: "#ffffff",
  black: "#000000",
};

// ---------- Tunables (source-2) ----------
const GRAVITY = 1800;          // px/s^2
const FLAP_VELOCITY = -420;    // px/s, instantaneous SET, not additive
const TERMINAL_VELOCITY = 500; // px/s cap on fall speed
const GROUND_H = 56;
const BIRD_X = 70;
const BIRD_RADIUS = 12;
const HITBOX_SCALE = 0.75;     // hitbox smaller than drawn sprite — arcade fairness

const PIPE_WIDTH = 52;
const PIPE_CAP_H = 14;
const PIPE_CAP_OVERHANG = 5;

const GAP_START = 140, GAP_MIN = 90;
const SPEED_START = 120, SPEED_MAX = 220; // px/s
const RAMP_EVERY = 10; // score points per difficulty step
const GAP_STEP = 6, SPEED_STEP = 8;
const PIPE_INTERVAL_PX = 170; // horizontal distance between pipe pairs

const INPUT_LOCKOUT_MS = 400; // sink: dead-tap protection after death

// ---------- State ----------
const STATE = { START: 0, PLAY: 1, DEAD: 2 };
let state = STATE.START;
let bird, pipes, score, best, frameShakeT, deathFlashT, lockoutUntil;
let tabHiddenAt = null;

function loadBest() {
  try { return parseInt(localStorage.getItem("flappy_best") || "0", 10) || 0; }
  catch (e) { return 0; }
}
function saveBest(v) {
  try { localStorage.setItem("flappy_best", String(v)); } catch (e) {}
}
best = loadBest();

function resetGame() {
  bird = { y: LOGICAL_H / 2, vy: 0, rot: 0 };
  pipes = [];
  score = 0;
  frameShakeT = 0;
  deathFlashT = 0;
  spawnPipeAt(LOGICAL_W + 40);
}

function currentGap() {
  const steps = Math.floor(score / RAMP_EVERY);
  return Math.max(GAP_MIN, GAP_START - steps * GAP_STEP);
}
function currentSpeed() {
  const steps = Math.floor(score / RAMP_EVERY);
  return Math.min(SPEED_MAX, SPEED_START + steps * SPEED_STEP);
}

function spawnPipeAt(x) {
  const gap = currentGap();
  const margin = 40;
  const centerY = margin + gap / 2 + Math.random() * (LOGICAL_H - GROUND_H - margin * 2 - gap);
  pipes.push({ x, gapY: centerY, gap, passed: false });
}

// ---------- Input: ONE handler for start / flap / restart (sink) ----------
function onFlap() {
  const now = performance.now();
  if (state === STATE.START) {
    state = STATE.PLAY;
    bird.vy = FLAP_VELOCITY;
  } else if (state === STATE.PLAY) {
    bird.vy = FLAP_VELOCITY;
  } else if (state === STATE.DEAD) {
    if (now < lockoutUntil) return; // dead-tap protection
    resetGame();
    state = STATE.START;
  }
}
window.addEventListener("keydown", (e) => {
  if (e.code === "Space" || e.code === "ArrowUp") { e.preventDefault(); onFlap(); }
});
canvas.addEventListener("mousedown", onFlap);
canvas.addEventListener("touchstart", (e) => { e.preventDefault(); onFlap(); }, { passive: false });

// Pause on tab-blur (sink)
document.addEventListener("visibilitychange", () => {
  tabHiddenAt = document.hidden ? performance.now() : null;
});

// ---------- Collision (source-2: circle-vs-rect, shrunk hitbox) ----------
function circleRectOverlap(cx, cy, r, rx, ry, rw, rh) {
  const nearestX = Math.max(rx, Math.min(cx, rx + rw));
  const nearestY = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - nearestX, dy = cy - nearestY;
  return (dx * dx + dy * dy) < (r * r);
}

function checkCollisions() {
  const hitR = BIRD_RADIUS * HITBOX_SCALE;
  // ground / ceiling — hard, unambiguous death, no fairness margin
  if (bird.y + hitR >= LOGICAL_H - GROUND_H || bird.y - hitR <= 0) return true;
  for (const p of pipes) {
    const topH = p.gapY - p.gap / 2;
    const botY = p.gapY + p.gap / 2;
    if (circleRectOverlap(BIRD_X, bird.y, hitR, p.x, 0, PIPE_WIDTH, topH)) return true;
    if (circleRectOverlap(BIRD_X, bird.y, hitR, p.x, botY, PIPE_WIDTH, LOGICAL_H - GROUND_H - botY)) return true;
  }
  return false;
}

// ---------- Update ----------
let lastT = performance.now();
function update(dt) {
  if (state === STATE.START) {
    bird.y = LOGICAL_H / 2 + Math.sin(performance.now() / 300) * 6; // gentle bob
    bird.rot = 0;
    return;
  }
  if (state !== STATE.PLAY) return;

  bird.vy = Math.min(bird.vy + GRAVITY * dt, TERMINAL_VELOCITY);
  bird.y += bird.vy * dt;
  // rotation derives directly from velocity — one state, two visual effects
  const t = Math.max(-1, Math.min(1, bird.vy / TERMINAL_VELOCITY));
  bird.rot = t < 0 ? t * 0.5 : t * 1.4; // nose-up on flap, steeper dive on fall

  const speed = currentSpeed();
  for (const p of pipes) {
    p.x -= speed * dt;
    if (!p.passed && p.x + PIPE_WIDTH < BIRD_X) {
      p.passed = true;
      score++;
      if (score > best) { best = score; saveBest(best); }
    }
  }
  while (pipes.length && pipes[0].x < -PIPE_WIDTH) pipes.shift();
  const rightmost = pipes.length ? pipes[pipes.length - 1].x : LOGICAL_W;
  if (LOGICAL_W - rightmost >= PIPE_INTERVAL_PX) spawnPipeAt(LOGICAL_W + 20);

  if (checkCollisions()) {
    state = STATE.DEAD;
    lockoutUntil = performance.now() + INPUT_LOCKOUT_MS;
    frameShakeT = 0.2;   // sink: ~200ms decaying screen shake
    deathFlashT = 0.08;  // sink: one-frame white flash
  }

  if (frameShakeT > 0) frameShakeT = Math.max(0, frameShakeT - dt);
  if (deathFlashT > 0) deathFlashT = Math.max(0, deathFlashT - dt);
}

// ---------- Draw ----------
let groundScrollX = 0;
let scorePopT = 0, lastScoreForPop = 0;

function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, LOGICAL_H);
  g.addColorStop(0, COLORS.skyTop);
  g.addColorStop(1, COLORS.skyBottom);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, LOGICAL_W, LOGICAL_H);
}

function drawGround(speed) {
  groundScrollX -= speed * (1 / 60);
  if (groundScrollX <= -16) groundScrollX += 16;
  const y = LOGICAL_H - GROUND_H;
  ctx.fillStyle = COLORS.groundEdge;
  ctx.fillRect(0, y, LOGICAL_W, 3);
  ctx.fillStyle = COLORS.ground;
  ctx.fillRect(0, y + 3, LOGICAL_W, GROUND_H - 3);
  ctx.strokeStyle = "rgba(0,0,0,0.08)";
  ctx.lineWidth = 1;
  for (let x = groundScrollX; x < LOGICAL_W; x += 16) {
    ctx.beginPath(); ctx.moveTo(x, y + 3); ctx.lineTo(x, LOGICAL_H); ctx.stroke();
  }
}

function drawPipe(p) {
  const topH = p.gapY - p.gap / 2;
  const botY = p.gapY + p.gap / 2;
  ctx.fillStyle = COLORS.pipeBody;
  ctx.strokeStyle = COLORS.pipeOutline;
  ctx.lineWidth = 2;
  // top pipe
  ctx.fillRect(p.x, 0, PIPE_WIDTH, topH);
  ctx.strokeRect(p.x + 1, 0, PIPE_WIDTH - 2, topH);
  ctx.fillRect(p.x - PIPE_CAP_OVERHANG, topH - PIPE_CAP_H, PIPE_WIDTH + PIPE_CAP_OVERHANG * 2, PIPE_CAP_H);
  ctx.strokeRect(p.x - PIPE_CAP_OVERHANG + 1, topH - PIPE_CAP_H, PIPE_WIDTH + PIPE_CAP_OVERHANG * 2 - 2, PIPE_CAP_H - 1);
  // bottom pipe
  const botH = LOGICAL_H - GROUND_H - botY;
  ctx.fillRect(p.x, botY, PIPE_WIDTH, botH);
  ctx.strokeRect(p.x + 1, botY, PIPE_WIDTH - 2, botH);
  ctx.fillRect(p.x - PIPE_CAP_OVERHANG, botY, PIPE_WIDTH + PIPE_CAP_OVERHANG * 2, PIPE_CAP_H);
  ctx.strokeRect(p.x - PIPE_CAP_OVERHANG + 1, botY + 1, PIPE_WIDTH + PIPE_CAP_OVERHANG * 2 - 2, PIPE_CAP_H - 2);
}

function drawBird() {
  ctx.save();
  ctx.translate(BIRD_X, bird.y);
  ctx.rotate(bird.rot);
  // body
  ctx.fillStyle = COLORS.bird;
  ctx.strokeStyle = COLORS.birdOutline;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(0, 0, BIRD_RADIUS, BIRD_RADIUS * 0.85, 0, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  // beak
  ctx.fillStyle = COLORS.beak;
  ctx.beginPath();
  ctx.moveTo(BIRD_RADIUS - 2, -3);
  ctx.lineTo(BIRD_RADIUS + 8, 0);
  ctx.lineTo(BIRD_RADIUS - 2, 4);
  ctx.closePath();
  ctx.fill();
  // eye
  ctx.fillStyle = COLORS.white;
  ctx.beginPath(); ctx.arc(3, -4, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = COLORS.black;
  ctx.beginPath(); ctx.arc(4.5, -4, 2, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function outlinedText(text, x, y, size, fill, align) {
  ctx.font = `bold ${size}px monospace`;
  ctx.textAlign = align || "center";
  ctx.lineWidth = Math.max(2, size / 8);
  ctx.strokeStyle = COLORS.black;
  ctx.strokeText(text, x, y);
  ctx.fillStyle = fill;
  ctx.fillText(text, x, y);
}

function medalFor(s) {
  if (s >= 30) return "#ffd700"; // gold
  if (s >= 15) return "#c0c0c0"; // silver
  if (s >= 5) return "#cd7f32";  // bronze
  return null;
}

function draw() {
  ctx.save();
  if (frameShakeT > 0) {
    const mag = 4 * (frameShakeT / 0.2);
    ctx.translate((Math.random() - 0.5) * mag, (Math.random() - 0.5) * mag);
  }

  drawSky();
  for (const p of pipes) drawPipe(p);
  drawGround(state === STATE.PLAY ? currentSpeed() : 0);
  drawBird();

  if (state === STATE.PLAY || state === STATE.DEAD) {
    if (score !== lastScoreForPop) { scorePopT = 0.15; lastScoreForPop = score; }
    const popScale = 1 + (scorePopT > 0 ? (scorePopT / 0.15) * 0.2 : 0);
    if (scorePopT > 0) scorePopT -= 1 / 60;
    ctx.save();
    ctx.translate(LOGICAL_W / 2, LOGICAL_H * 0.15);
    ctx.scale(popScale, popScale);
    outlinedText(String(score), 0, 0, 36, COLORS.white);
    ctx.restore();
  }

  outlinedText("best " + best, LOGICAL_W - 6, 14, 10, COLORS.white, "right");

  if (state === STATE.START) {
    outlinedText("Flappy Bird", LOGICAL_W / 2, LOGICAL_H * 0.32, 22, COLORS.white);
    outlinedText("tap / space to flap", LOGICAL_W / 2, LOGICAL_H * 0.4, 11, COLORS.white);
  }

  if (state === STATE.DEAD) {
    ctx.fillStyle = "rgba(0,0,0,0.45)";
    const panelW = 180, panelH = 120, px = (LOGICAL_W - panelW) / 2, py = LOGICAL_H * 0.32;
    roundRect(px, py, panelW, panelH, 10);
    ctx.fill();
    outlinedText("Game Over", LOGICAL_W / 2, py + 26, 16, COLORS.white);
    outlinedText("score " + score, LOGICAL_W / 2, py + 50, 13, COLORS.white);
    outlinedText("best " + best, LOGICAL_W / 2, py + 68, 13, COLORS.white);
    const medal = medalFor(score);
    if (medal) {
      ctx.beginPath();
      ctx.arc(LOGICAL_W / 2, py + 90, 9, 0, Math.PI * 2);
      ctx.fillStyle = medal;
      ctx.fill();
      ctx.strokeStyle = COLORS.black; ctx.lineWidth = 1.5; ctx.stroke();
    } else {
      outlinedText("tap to retry", LOGICAL_W / 2, py + 96, 10, COLORS.white);
    }
  }

  if (deathFlashT > 0) {
    ctx.fillStyle = `rgba(255,255,255,${deathFlashT / 0.08 * 0.6})`;
    ctx.fillRect(0, 0, LOGICAL_W, LOGICAL_H);
  }

  ctx.restore();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// ---------- Main loop ----------
function loop(t) {
  requestAnimationFrame(loop);
  if (tabHiddenAt !== null) { lastT = t; return; } // paused on tab-blur
  let dt = (t - lastT) / 1000;
  dt = Math.min(dt, 1 / 30); // clamp to avoid a huge catch-up jump after a stall
  lastT = t;
  update(dt);
  draw();
}

resetGame();
requestAnimationFrame(loop);

// Read-only debug hook for automated QA — no gameplay effect.
window.__flappyDebug = () => ({ state, score, best, birdY: bird.y, birdVy: bird.vy, pipeCount: pipes.length });
window.__flappyFlap = onFlap;
</script>
</body>
</html>
