# Demo: serve https://help.bunsenbrenner.org through the Browser Plane, with a
# real Let's Encrypt certificate obtained at the origin via deSEC DNS-01.
#
# Runs ALONGSIDE an already-running plane (ct-edge with CT_EDGE_BROWSER_LISTEN=:443
# and a ct-control-plane the agent onboards against). Adapt the network/names to
# your plane's compose. Env comes from docker/deploy/.env (see docs/dns01-desec.md).
#
#   docker compose -f examples/help-site/compose.help-site.yml \
#     --env-file docker/deploy/.env up --build -d
services:
  help-origin:
    # Caddy + deSEC plugin: terminates TLS with the LE cert for the hostname.
    build:
      context: .
      dockerfile: Caddy.Dockerfile
    environment:
      # deSEC token for DNS-01 (never committed; from docker/deploy/.env).
      - DESEC_TOKEN=${DESEC_TOKEN:?set DESEC_TOKEN in docker/deploy/.env}
    volumes:
      - ./index.html:/srv/index.html:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - help_caddy_data:/data
    expose:
      - "443"   # reachable only via the tunnel/agent, not published to the host

  help-agent:
    # The workspace ct-agent image, in Browser-Plane mode.
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      args:
        - CRATE=ct-agent
    environment:
      - CT_AGENT_MODE=browser                       # SNI passthrough to the origin
      - CT_AGENT_HOSTNAME=help.bunsenbrenner.org     # bound at the edge via 'H'
      - CT_AGENT_ORIGIN=help-origin:443              # forward raw TLS here
      - CT_AGENT_ORIGIN_PROTO=tcp
      - CT_AGENT_EDGE=${HELP_AGENT_EDGE:?edge host:port, e.g. edge:4433}
      - CT_AGENT_CP_URL=${HELP_AGENT_CP_URL:?control-plane URL for onboarding}
      - CT_AGENT_JOIN_TOKEN=${HELP_JOIN_TOKEN:?single-use join token}
      - CT_AGENT_ID=help-demo
      - CT_AGENT_EDGE_CERT_URL=${HELP_AGENT_EDGE_CERT_URL:-}
    command: ["onboard"]
    depends_on:
      - help-origin

volumes:
  help_caddy_data:
